# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  verify-credentials:
    name: Verify Credentials
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Generate credential
        run: cargo run --release --example mldsa-65-vc-generate --features w3c

      - name: Verify credential
        run: cargo run --release --example verify_vc --features w3c -- degree_bs_computer_science.json

      - name: Upload credential
        uses: actions/upload-artifact@v4
        with:
          name: sample-credential
          path: |
            degree_bs_computer_science.json
            issuer_keys/

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [test, lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ml-dsa-65-linux-x86_64
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ml-dsa-65-windows-x86_64
            ext: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ml-dsa-65-macos-x86_64
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ml-dsa-65-macos-arm64
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build main binary
        run: cargo build --release --target ${{ matrix.target }} --features w3c,serde_support

      - name: Build vc_verify
        run: cargo build --release --target ${{ matrix.target }} --bin vc_verify --features w3c

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ml-dsa-65 dist/
          cp target/${{ matrix.target }}/release/vc_verify dist/
          tar -czf ${{ matrix.artifact }}.${{ matrix.ext }} -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/ml-dsa-65.exe" "dist/"
          Copy-Item "target/${{ matrix.target }}/release/vc_verify.exe" "dist/"
          Compress-Archive -Path "dist/*" -DestinationPath "${{ matrix.artifact }}.${{ matrix.ext }}"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, verify-credentials]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ML-DSA-65 ${{ github.ref_name }}
          body: |
            ## ML-DSA-65 ${{ github.ref_name }}

            FIPS 204 post-quantum digital signatures with W3C Verifiable Credential support.

            ### Binaries

            - Linux (x86_64)
            - Windows (x86_64)
            - macOS (x86_64)
            - macOS (ARM64 / Apple Silicon)

            ### Usage
