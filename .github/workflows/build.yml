# .github/workflows/build.yml
# CI/CD Pipeline for ML-DSA-65 Post-Quantum Identity System
# Generates artifacts for Windows, Linux, and macOS

name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: ml-dsa-65

jobs:
  # ── Test ──────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --all-features

      - name: Run library tests
        run: cargo test --lib --all-features

  # ── Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --all-features -- -D warnings

  # ── Build Binaries ────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test, lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ml-dsa-65
            artifact: ml-dsa-65-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ml-dsa-65.exe
            artifact: ml-dsa-65-windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: ml-dsa-65
            artifact: ml-dsa-65-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build main binary
        run: cargo build --release --target ${{ matrix.target }} --features w3c,serde_support

      - name: Build vc_verify binary
        run: cargo build --release --target ${{ matrix.target }} --bin vc_verify --features w3c

      - name: Package artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} release/
          cp target/${{ matrix.target }}/release/vc_verify release/
          # Copy examples and docs
          cp -r examples release/ 2>/dev/null || true
          cp README.md release/ 2>/dev/null || true
          cp LICENSE release/ 2>/dev/null || true
          # Create archive
          tar -czf ${{ matrix.artifact }}.tar.gz -C release .

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "release/"
          Copy-Item "target/${{ matrix.target }}/release/vc_verify.exe" "release/"
          if (Test-Path "examples") { Copy-Item -Recurse "examples" "release/" }
          if (Test-Path "README.md") { Copy-Item "README.md" "release/" }
          Compress-Archive -Path "release/*" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: warn

  # ── Generate Test Credentials ─────────────────────────────────────────
  generate-vc:
    name: Generate Test Credential
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Generate degree VC
        run: cargo run --release --example mldsa-65-vc-generate --features w3c

      - name: Verify degree VC
        run: cargo run --release --example verify_vc --features w3c -- degree_bs_computer_science.json

      - name: Upload generated VC
        uses: actions/upload-artifact@v4
        with:
          name: sample-credentials
          path: |
            degree_bs_computer_science.json
            degree_bs_computer_science.min.json
            issuer_keys/

  # ── macOS ARM (Apple Silicon) ─────────────────────────────────────────
  build-macos-arm:
    name: Build (macOS ARM64)
    runs-on: macos-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          cargo build --release --target aarch64-apple-darwin --features w3c,serde_support
          cargo build --release --target aarch64-apple-darwin --bin vc_verify --features w3c

      - name: Package
        run: |
          mkdir -p release
          cp target/aarch64-apple-darwin/release/ml-dsa-65 release/
          cp target/aarch64-apple-darwin/release/vc_verify release/
          tar -czf ml-dsa-65-macos-arm64.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-dsa-65-macos-arm64
          path: ml-dsa-65-macos-arm64.tar.gz

  # ── Create GitHub Release ─────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-macos-arm, generate-vc]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ML-DSA-65 ${{ github.ref_name }}
          body: |
            ## ML-DSA-65 Post-Quantum Identity System — ${{ github.ref_name }}
            
            ### FIPS 204 · W3C Verifiable Credentials · did:key
            
            **Binaries for:**
            - Linux (x86_64)
            - Windows (x86_64)
            - macOS (x86_64 + ARM64/Apple Silicon)
            
            ### Included binaries
            - `ml-dsa-65` — Main binary
            - `vc_verify` — VC verification tool
            
            ### Usage
            ```bash
            # Generate a degree credential
            ./ml-dsa-65
            
            # Verify a credential
            ./vc_verify credential.json